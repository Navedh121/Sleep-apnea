<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpO2 Monitor — Nights</title>
  <link rel="stylesheet" href="/app/theme.css">
  <style>
    /* ── empty / loading state ── */
    #msg { padding: 12px 0; }
  </style>
</head>
<body>

<header class="app-header">
  <div class="app-brand">
    <span class="app-brand-name">SpO2 Sleep Monitor</span>
    <span class="app-brand-sub">Screening tool — not a medical device</span>
  </div>
  <nav class="app-nav">
    <a href="/app/index.html" class="active">Nights</a>
    <a href="/app/live.html">Live</a>
    <a href="/app/verdict.html">Verdict</a>
    <a href="/app/chat.html">Chat</a>
  </nav>
</header>

<main class="page-main">
  <h2>Night History</h2>

  <div class="card">
    <p id="msg" class="msg-muted">Loading…</p>

    <table id="tbl" style="display:none">
      <thead>
        <tr>
          <th>Session</th>
          <th>Date</th>
          <th>Duration</th>
          <th>Band</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

<footer class="app-footer">
  Screening tool — not a diagnosis or treatment. Consult a sleep specialist.
</footer>

<script>
  /* Map a band string to its CSS chip class */
  function bandClass(band) {
    const known = ['normal', 'mild', 'moderate', 'severe', 'insufficient'];
    return known.includes(band) ? `chip-${band}` : 'chip-insufficient';
  }

  function fmtDuration(s) {
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    if (h > 0) return `${h}h ${m}m`;
    return `${m}m`;
  }

  async function loadNights() {
    const msg   = document.getElementById('msg');
    const tbl   = document.getElementById('tbl');
    const tbody = document.getElementById('tbody');

    try {
      const resp   = await fetch('/nights');
      const nights = await resp.json();

      if (nights.length === 0) {
        msg.textContent = 'No nights recorded yet. Upload a CSV: POST /night?session_id=1';
        return;
      }

      msg.style.display = 'none';
      tbl.style.display  = 'table';

      nights.forEach(n => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>#${n.session_id}</td>
          <td>${n.received_date}</td>
          <td>${fmtDuration(n.duration_s)}</td>
          <td><span class="chip ${bandClass(n.band)}">${n.band}</span></td>
          <td>
            <a class="btn btn-secondary" href="/app/verdict.html?session_id=${n.session_id}">Verdict</a>
            ${!n.insufficient
              ? `<a class="btn btn-secondary" href="/app/chat.html?session_id=${n.session_id}">Chat</a>`
              : ''}
            <button class="btn btn-danger" onclick="deleteNight(${n.session_id}, this)">Delete</button>
          </td>
        `;
        tbody.appendChild(tr);
      });

    } catch (e) {
      msg.textContent = `Could not load nights: ${e.message}. Is the server running?`;
    }
  }

  loadNights();

  async function deleteNight(sessionId, btn) {
    if (!confirm(`Delete session #${sessionId} and all its samples?\nThis cannot be undone.`)) return;

    btn.disabled = true;
    btn.textContent = '…';

    try {
      const r = await fetch(`/nights/${sessionId}`, { method: 'DELETE' });
      if (r.ok) {
        btn.closest('tr').remove();
        const tbody = document.getElementById('tbody');
        if (tbody.rows.length === 0) {
          document.getElementById('tbl').style.display = 'none';
          const msg = document.getElementById('msg');
          msg.style.display = '';
          msg.textContent = 'No nights recorded yet. Upload a CSV: POST /night?session_id=1';
        }
      } else {
        const data = await r.json().catch(() => ({}));
        alert(`Delete failed: ${data.detail || r.status}`);
        btn.disabled = false;
        btn.textContent = 'Delete';
      }
    } catch (e) {
      alert(`Network error: ${e.message}`);
      btn.disabled = false;
      btn.textContent = 'Delete';
    }
  }
</script>

</body>
</html>
